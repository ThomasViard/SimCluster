# Prometheus Service - Internal access (port-forward for external)
apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: simcluster
  labels:
    app: prometheus
    component: monitoring
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
  - name: http
    port: 9090
    targetPort: 9090
    protocol: TCP
