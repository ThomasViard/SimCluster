# ClusterIP Service - Internal Dashboard exposure
apiVersion: v1
kind: Service
metadata:
  name: dashboard-svc
  namespace: simcluster
  labels:
    app: dashboard
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: dashboard
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
