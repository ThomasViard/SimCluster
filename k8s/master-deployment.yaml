apiVersion: apps/v1
kind: Deployment
metadata:
  name: master
  namespace: simcluster
  labels:
    app: master
    component: control-plane
spec:
  replicas: 1  # Singleton - single instance only
  selector:
    matchLabels:
      app: master
  template:
    metadata:
      labels:
        app: master
        component: control-plane
    spec:
      containers:
      - name: master
        image: simcluster-master:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        envFrom:
        - configMapRef:
            name: simcluster-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/master/ping
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/master/ping
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
      terminationGracePeriodSeconds: 30