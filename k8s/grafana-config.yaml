# Grafana configuration: datasource provisioning + dashboard provisioning + dashboard JSON
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: simcluster
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-svc:9090
        uid: PBFA97CFB590B2093
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: simcluster
  labels:
    app: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: SimCluster
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: simcluster
  labels:
    app: grafana
data:
  simcluster.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "id": 1,
          "title": "Tasks Pending",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [{ "expr": "simcluster_tasks_pending", "refId": "A" }],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 50 }
                ]
              }
            },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "id": 2,
          "title": "Tasks Running",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [{ "expr": "simcluster_tasks_running", "refId": "A" }],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "orange", "value": 20 }
                ]
              }
            },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "id": 3,
          "title": "Tasks Completed",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [{ "expr": "simcluster_tasks_completed_total", "refId": "A" }],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
          "id": 4,
          "title": "Tasks Failed",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [{ "expr": "simcluster_tasks_failed_total", "refId": "A" }],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
          "id": 5,
          "title": "Workers Total",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [{ "expr": "simcluster_workers_total", "refId": "A" }],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "purple", "value": null }] }
            },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
          "id": 6,
          "title": "Workers Available",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [{ "expr": "simcluster_workers_available", "refId": "A" }],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 7,
          "title": "Task Queue (Pending + Running)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            { "expr": "simcluster_tasks_pending", "legendFormat": "Pending", "refId": "A" },
            { "expr": "simcluster_tasks_running", "legendFormat": "Running", "refId": "B" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 20, "lineWidth": 2, "spanNulls": false }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Pending" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Running" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }] }
            ]
          },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom" } }
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 8,
          "title": "Task Throughput (completed/s)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            { "expr": "rate(simcluster_tasks_completed_total[1m])", "legendFormat": "Completed/s", "refId": "A" },
            { "expr": "rate(simcluster_tasks_failed_total[1m])", "legendFormat": "Failed/s", "refId": "B" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 20, "lineWidth": 2 },
              "unit": "ops"
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Completed/s" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Failed/s" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
            ]
          },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom" } }
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "id": 9,
          "title": "Worker Busy Threads",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            { "expr": "simcluster_worker_busy_threads", "legendFormat": "{{instance}}", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2 },
              "unit": "short"
            },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom" } }
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "id": 10,
          "title": "Worker CPU Time (rate)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            { "expr": "rate(process_cpu_seconds_total[1m])", "legendFormat": "{{instance}}", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2 },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom" } }
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "id": 11,
          "title": "Workers Count Over Time",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            { "expr": "simcluster_workers_total", "legendFormat": "Total", "refId": "A" },
            { "expr": "simcluster_workers_available", "legendFormat": "Available", "refId": "B" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2 },
              "unit": "short",
              "decimals": 0
            },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom" } }
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "id": 12,
          "title": "Worker Memory Usage",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            { "expr": "process_working_set_bytes", "legendFormat": "{{instance}}", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2 },
              "unit": "bytes"
            },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom" } }
        }
      ],
      "refresh": "5s",
      "schemaVersion": 39,
      "tags": ["simcluster", "kubernetes"],
      "templating": { "list": [] },
      "time": { "from": "now-15m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "SimCluster - Cluster Monitoring",
      "uid": "simcluster-main",
      "version": 1
    }
