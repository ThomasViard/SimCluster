# Prometheus configuration - scrape targets for Master and Workers
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: simcluster
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    scrape_configs:
      # Scrape the Master (singleton pod)
      - job_name: 'simcluster-master'
        metrics_path: '/metrics'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['simcluster']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: master
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance

      # Scrape all Worker pods (auto-discovered, scales with HPA)
      - job_name: 'simcluster-workers'
        metrics_path: '/metrics'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['simcluster']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: worker
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:5001
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
