# Prometheus RBAC - Service account and permissions to discover pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: simcluster
  labels:
    app: prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: simcluster-prometheus
  labels:
    app: prometheus
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: simcluster-prometheus
  labels:
    app: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: simcluster
roleRef:
  kind: ClusterRole
  name: simcluster-prometheus
  apiGroup: rbac.authorization.k8s.io
