apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: simcluster
  labels:
    app: worker
    component: compute
spec:
  replicas: 2  # Initial count (scalable via HPA)
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        component: compute
    spec:
      containers:
      - name: worker
        image: simcluster-worker:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5001
          name: http
          protocol: TCP
        env:
        # Downward API - Worker self-identification
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: WORKER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: WORKER_URL
          value: "http://$(POD_IP):5001"
        - name: ASPNETCORE_URLS
          value: "http://+:5001"
        envFrom:
        - configMapRef:
            name: simcluster-config
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
      terminationGracePeriodSeconds: 30
